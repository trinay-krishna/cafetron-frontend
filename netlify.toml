[build]
command = "npm install && npm run build"
publish = "dist/cafetron-frontend/browser"

[[redirects]]
from = "/api/*"
to = "https://cafetron-backend-3aof.onrender.com/api/:splat"
status = 200
force = true

[[redirects]]
from = "/ws/*"
to = "https://cafetron-backend-3aof.onrender.com/ws/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200