<main class="register-page">
  <section class="register-shell">
    <aside class="register-art" aria-hidden="true">
      <p class="eyebrow">New account</p>
      <h1>Join the daily table.</h1>
      <svg viewBox="0 0 420 280">
        <path class="ticket" d="M88 72h244c20 0 36 16 36 36v92c0 20-16 36-36 36H88c-20 0-36-16-36-36v-92c0-20 16-36 36-36Z" />
        <path d="M126 124h166M126 162h118M310 72c-14 20-14 49 0 69 14 21 14 49 0 70" />
        <path class="spark" d="M94 42l16 20 24-10M330 36l-8 26 26 8" />
      </svg>
    </aside>

    <section class="register-card">
      <div class="brand-mark">
        <span class="material-symbols-outlined">person_add</span>
      </div>
      <p class="eyebrow">Cafetron access</p>
      <h2>Create account</h2>
      <p class="subtitle">Set up your profile for menu ordering and pickup.</p>

      <form (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Your full name" required />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="formData.email" name="email" placeholder="you@cafetron.com" required />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" [(ngModel)]="formData.password" name="password" placeholder="Create a password" required />
          </div>

          <div class="form-group">
            <label>Employee ID</label>
            <input type="text" [(ngModel)]="formData.employeeId" name="employeeId" placeholder="e.g. EMP001" required />
          </div>

          <div class="form-group">
            <label>Department</label>
            <input type="text" [(ngModel)]="formData.department" name="department" placeholder="e.g. Engineering" />
          </div>

          <div class="form-group">
            <label>Role</label>
            <select [(ngModel)]="formData.role" name="role">
              <option value="EMPLOYEE">Employee</option>
              <option value="VENDOR">Vendor</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
        </div>

        @if (errorMessage()) {
          <div class="error-message">
            <span class="material-symbols-outlined">error</span>
            {{ errorMessage() }}
          </div>
        }

        @if (successMessage()) {
          <div class="success-message">
            <span class="material-symbols-outlined">check_circle</span>
            {{ successMessage() }}
          </div>
        }

        <button type="submit" [disabled]="isLoading()">
          <span>{{ isLoading() ? 'Creating account...' : 'Create Account' }}</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </form>

      <p class="login-link">
        Already have an account?
        <a routerLink="/login">Sign in</a>
      </p>
    </section>
  </section>
</main>
